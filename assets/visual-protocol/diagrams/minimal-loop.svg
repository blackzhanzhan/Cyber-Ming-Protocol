<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Minimal loop diagram</title>
  <desc id="desc">A character-led diagram showing the human hub routing between executor and auditor in the minimal loop.</desc>
  <defs>
    <style>
      .bg{fill:#F6F0E6}
      .panel{fill:#FFF9F0;stroke:#3A312B;stroke-width:4}
      .ink{stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .arrow{fill:none;stroke:#7F3733;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .gold{fill:#E2B93B;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .cream{fill:#F5E4B8;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .cloud{fill:#E9E0D3;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .blue{fill:#7E8794;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .blue-dark{fill:#56606D;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .russet{fill:#9B5B46;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .russet-dark{fill:#7A4638;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .paper{fill:#F7F1E5;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .seal{fill:#A54A46;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .skin{fill:#E8C3A1;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .label{font:700 30px Georgia, serif; fill:#3A312B}
      .small{font:600 21px 'Trebuchet MS', sans-serif; fill:#3A312B}
      .tiny{font:500 17px 'Trebuchet MS', sans-serif; fill:#3A312B}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#7F3733"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="100" y="90" class="label">Minimal Loop</text>
  <text x="100" y="128" class="small">The loop closes only through the human hub.</text>

  <rect x="620" y="110" width="360" height="220" rx="28" class="panel"/>
  <path d="M760 270 C714 296 724 332 775 338 C826 344 866 323 885 292" class="gold"/>
  <ellipse cx="810" cy="240" rx="84" ry="92" class="gold"/>
  <ellipse cx="810" cy="250" rx="50" ry="65" class="cream"/>
  <circle cx="810" cy="175" r="68" class="gold"/>
  <ellipse cx="810" cy="190" rx="52" ry="38" class="cream"/>
  <path d="M770 124 L748 90 L784 105" class="gold"/>
  <path d="M848 124 L872 90 L836 105" class="gold"/>
  <circle cx="784" cy="171" r="8" fill="#3A312B"/>
  <circle cx="835" cy="171" r="8" fill="#3A312B"/>
  <path d="M782 206 Q810 220 838 206" class="ink" fill="none"/>
  <path d="M754 282 C778 304 842 304 865 282" class="cloud"/>
  <text x="810" y="306" text-anchor="middle" class="small">Xiao Huanglong</text>

  <rect x="130" y="420" width="470" height="370" rx="28" class="panel"/>
  <text x="365" y="470" text-anchor="middle" class="label">Executor</text>
  <ellipse cx="330" cy="565" rx="54" ry="62" class="skin"/>
  <rect x="288" y="517" width="84" height="26" rx="12" class="russet-dark"/>
  <path d="M281 540 L248 514 L294 507 L309 539" class="russet-dark"/>
  <path d="M379 541 L411 514 L366 507 L351 539" class="russet-dark"/>
  <circle cx="312" cy="562" r="7" fill="#3A312B"/>
  <circle cx="347" cy="566" r="7" fill="#3A312B"/>
  <path d="M295 554 Q313 547 328 554" class="ink" fill="none"/>
  <path d="M332 558 Q349 551 365 558" class="ink" fill="none"/>
  <path d="M262 722 L284 608 L354 608 L402 722 Z" class="russet"/>
  <rect x="294" y="608" width="52" height="88" rx="18" class="russet-dark"/>
  <rect x="405" y="590" width="84" height="116" rx="10" class="paper" transform="rotate(10 447 648)"/>
  <circle cx="425" cy="686" r="10" class="seal"/>
  <text x="366" y="744" text-anchor="middle" class="small">Yan Song</text>
  <text x="365" y="775" text-anchor="middle" class="tiny">submit contract / implement / return evidence</text>

  <rect x="1000" y="420" width="470" height="370" rx="28" class="panel"/>
  <text x="1235" y="470" text-anchor="middle" class="label">Auditor</text>
  <ellipse cx="1200" cy="565" rx="54" ry="62" class="skin"/>
  <rect x="1158" y="517" width="84" height="26" rx="12" class="blue-dark"/>
  <path d="M1151 540 L1118 514 L1164 507 L1179 539" class="blue-dark"/>
  <path d="M1249 541 L1281 514 L1236 507 L1221 539" class="blue-dark"/>
  <circle cx="1182" cy="562" r="7" fill="#3A312B"/>
  <circle cx="1217" cy="562" r="7" fill="#3A312B"/>
  <path d="M1165 554 Q1183 546 1198 553" class="ink" fill="none"/>
  <path d="M1202 553 Q1219 546 1235 553" class="ink" fill="none"/>
  <path d="M1166 722 L1186 608 L1254 608 L1274 722 Z" class="blue"/>
  <rect x="1195" y="608" width="48" height="90" rx="18" class="blue-dark"/>
  <rect x="1275" y="602" width="76" height="102" rx="10" class="paper" transform="rotate(7 1313 653)"/>
  <circle cx="1293" cy="687" r="10" class="seal"/>
  <text x="1235" y="744" text-anchor="middle" class="small">Xu Jie</text>
  <text x="1235" y="775" text-anchor="middle" class="tiny">review plan / review evidence / return judgment</text>

  <rect x="635" y="390" width="330" height="82" rx="18" class="panel"/>
  <text x="800" y="424" text-anchor="middle" class="small">Human route</text>
  <text x="800" y="452" text-anchor="middle" class="tiny">plan first / audit first / evidence first / final ruling stays human</text>

  <path d="M600 540 C664 497 705 458 734 345" class="arrow"/>
  <path d="M739 360 C707 474 654 562 581 628" class="arrow"/>
  <text x="602" y="487" class="tiny">contract</text>
  <text x="590" y="585" class="tiny">grant or return</text>

  <path d="M967 345 C998 456 1038 495 1110 538" class="arrow"/>
  <path d="M1096 628 C1023 562 971 473 940 360" class="arrow"/>
  <text x="1012" y="486" class="tiny">audit packet</text>
  <text x="1004" y="586" class="tiny">judgment back</text>

  <path d="M553 682 C640 760 930 760 1015 680" class="arrow"/>
  <text x="800" y="744" text-anchor="middle" class="small">evidence returns through the human hub before completion stands</text>
</svg>
