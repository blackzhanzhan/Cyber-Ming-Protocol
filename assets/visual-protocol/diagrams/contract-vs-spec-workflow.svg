<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Contract-driven versus spec and workflow</title>
  <desc id="desc">A three-column comparison showing spec, workflow, and contract-driven governance as distinct planning objects.</desc>
  <defs>
    <style>
      .bg{fill:#F6F0E6}
      .panel{fill:#FFF9F0;stroke:#3A312B;stroke-width:4}
      .ink{stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .spec{fill:#DCCAB3;stroke:#3A312B;stroke-width:4}
      .flow{fill:#E9E0D3;stroke:#3A312B;stroke-width:4}
      .contract{fill:#F2E4B0;stroke:#3A312B;stroke-width:4}
      .seal{fill:#A54A46;stroke:#3A312B;stroke-width:4}
      .gold{fill:#E2B93B;stroke:#3A312B;stroke-width:4}
      .paper{fill:#F7F1E5;stroke:#3A312B;stroke-width:4}
      .label{font:700 30px Georgia, serif; fill:#3A312B}
      .small{font:600 21px 'Trebuchet MS', sans-serif; fill:#3A312B}
      .tiny{font:500 17px 'Trebuchet MS', sans-serif; fill:#3A312B}
    </style>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="100" y="92" class="label">Contract-driven vs Spec / Workflow</text>
  <text x="100" y="128" class="small">Cyber-Ming does not replace them. It changes the governance object for the current slice.</text>

  <rect x="80" y="180" width="440" height="700" rx="30" class="panel"/>
  <rect x="580" y="180" width="440" height="700" rx="30" class="panel"/>
  <rect x="1080" y="180" width="440" height="700" rx="30" class="panel"/>

  <text x="300" y="236" text-anchor="middle" class="label">Spec</text>
  <text x="800" y="236" text-anchor="middle" class="label">Workflow</text>
  <text x="1300" y="236" text-anchor="middle" class="label">Contract-driven</text>

  <g>
    <rect x="182" y="310" width="236" height="320" rx="18" class="spec"/>
    <path d="M204 350 H394" class="ink"/>
    <path d="M204 392 H394" class="ink"/>
    <path d="M204 434 H394" class="ink"/>
    <path d="M204 476 H394" class="ink"/>
    <path d="M204 518 H394" class="ink"/>
    <path d="M204 560 H394" class="ink"/>
    <text x="300" y="668" text-anchor="middle" class="small">large-direction blueprint</text>
    <text x="300" y="708" text-anchor="middle" class="tiny">good for global scope and product shape</text>
  </g>

  <g>
    <rect x="646" y="328" width="104" height="76" rx="16" class="flow"/>
    <rect x="750" y="328" width="104" height="76" rx="16" class="flow"/>
    <rect x="854" y="328" width="104" height="76" rx="16" class="flow"/>
    <rect x="646" y="470" width="104" height="76" rx="16" class="flow"/>
    <rect x="750" y="470" width="104" height="76" rx="16" class="flow"/>
    <rect x="854" y="470" width="104" height="76" rx="16" class="flow"/>
    <path d="M750 366 H750" class="ink"/>
    <path d="M854 366 H854" class="ink"/>
    <path d="M698 404 V470" class="ink"/>
    <path d="M802 404 V470" class="ink"/>
    <path d="M906 404 V470" class="ink"/>
    <text x="698" y="372" text-anchor="middle" class="tiny">step</text>
    <text x="802" y="372" text-anchor="middle" class="tiny">step</text>
    <text x="906" y="372" text-anchor="middle" class="tiny">step</text>
    <text x="698" y="514" text-anchor="middle" class="tiny">step</text>
    <text x="802" y="514" text-anchor="middle" class="tiny">step</text>
    <text x="906" y="514" text-anchor="middle" class="tiny">step</text>
    <text x="800" y="668" text-anchor="middle" class="small">process string</text>
    <text x="800" y="708" text-anchor="middle" class="tiny">good for repeatable order and operating rhythm</text>
  </g>

  <g>
    <rect x="1170" y="314" width="262" height="164" rx="22" class="contract"/>
    <path d="M1210 356 H1392" class="ink"/>
    <path d="M1210 394 H1392" class="ink"/>
    <path d="M1210 432 H1392" class="ink"/>
    <circle cx="1364" cy="446" r="18" class="seal"/>
    <circle cx="1248" cy="556" r="38" class="gold"/>
    <path d="M1222 586 C1235 600 1260 600 1274 586" class="ink" fill="none"/>
    <rect x="1314" y="520" width="118" height="70" rx="14" class="paper"/>
    <text x="1373" y="560" text-anchor="middle" class="tiny">slice</text>
    <text x="1300" y="668" text-anchor="middle" class="small">current-slice governance object</text>
    <text x="1300" y="708" text-anchor="middle" class="tiny">lighter than heavy spec, harder than ordinary plan</text>
    <text x="1300" y="740" text-anchor="middle" class="tiny">human-routed, auditable, and pulse-chainable</text>
  </g>

  <rect x="100" y="796" width="1400" height="96" rx="20" class="panel"/>
  <text x="800" y="838" text-anchor="middle" class="small">Spec handles direction. Workflow handles process order. Atomic Execution Contracts govern the cut you are actually making now.</text>
  <text x="800" y="870" text-anchor="middle" class="tiny">Cyber-Ming adds a governance layer at the slice boundary instead of asking one giant object to do every job.</text>
</svg>
