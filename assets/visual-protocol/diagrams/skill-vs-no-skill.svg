<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Skill versus no Skill</title>
  <desc id="desc">Comparison diagram showing role drift without Skill and clearer rhythm with Skill.</desc>
  <defs>
    <style>
      .bg{fill:#F6F0E6}
      .panel{fill:#FFF9F0;stroke:#3A312B;stroke-width:4}
      .soft{fill:#F2EAE0;stroke:#8B8379;stroke-width:4;stroke-dasharray:10 10}
      .good{fill:#F3F7F2;stroke:#3A312B;stroke-width:4}
      .ink{stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .wobble{fill:none;stroke:#8B8379;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:8 10;marker-end:url(#gray-arrow)}
      .arrow{fill:none;stroke:#7F3733;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .gold{fill:#E2B93B;stroke:#3A312B;stroke-width:4}
      .cloud{fill:#E9E0D3;stroke:#3A312B;stroke-width:4}
      .blue{fill:#7E8794;stroke:#3A312B;stroke-width:4}
      .russet{fill:#9B5B46;stroke:#3A312B;stroke-width:4}
      .paper{fill:#F7F1E5;stroke:#3A312B;stroke-width:4}
      .seal{fill:#A54A46;stroke:#3A312B;stroke-width:4}
      .label{font:700 30px Georgia, serif; fill:#3A312B}
      .small{font:600 21px 'Trebuchet MS', sans-serif; fill:#3A312B}
      .tiny{font:500 17px 'Trebuchet MS', sans-serif; fill:#3A312B}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#7F3733"/>
    </marker>
    <marker id="gray-arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#8B8379"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="100" y="92" class="label">Skill vs No Skill</text>
  <text x="100" y="128" class="small">Skill does not create truth. It stabilizes rhythm and boundaries.</text>

  <rect x="80" y="180" width="690" height="700" rx="30" class="soft"/>
  <rect x="830" y="180" width="690" height="700" rx="30" class="good"/>

  <text x="425" y="232" text-anchor="middle" class="label">No Skill</text>
  <text x="1175" y="232" text-anchor="middle" class="label">With Skill</text>

  <g>
    <circle cx="425" cy="300" r="45" class="gold"/>
    <path d="M392 336 C408 353 444 353 459 336" class="cloud"/>
    <text x="425" y="358" text-anchor="middle" class="tiny">human keeps re-briefing</text>

    <rect x="175" y="430" width="190" height="240" rx="24" class="panel" transform="rotate(-6 270 550)"/>
    <text x="270" y="470" text-anchor="middle" class="small">Executor</text>
    <rect x="205" y="510" width="120" height="84" rx="12" class="paper" transform="rotate(7 265 552)"/>
    <line x1="220" y1="538" x2="313" y2="556" class="ink"/>
    <line x1="220" y1="565" x2="309" y2="582" class="ink"/>
    <text x="270" y="632" text-anchor="middle" class="tiny">contract shape drifts</text>

    <rect x="485" y="430" width="190" height="240" rx="24" class="panel" transform="rotate(5 580 550)"/>
    <text x="580" y="470" text-anchor="middle" class="small">Auditor</text>
    <rect x="525" y="516" width="110" height="72" rx="12" class="paper" transform="rotate(-8 580 552)"/>
    <circle cx="558" cy="598" r="10" class="seal"/>
    <text x="580" y="632" text-anchor="middle" class="tiny">boundary re-explained</text>

    <path d="M414 346 C357 404 320 436 294 440" class="wobble"/>
    <path d="M438 346 C492 406 533 437 560 440" class="wobble"/>
    <path d="M364 676 C454 740 512 736 605 674" class="wobble"/>

    <rect x="208" y="705" width="106" height="40" rx="12" class="paper" transform="rotate(-8 261 725)"/>
    <rect x="504" y="705" width="114" height="40" rx="12" class="paper" transform="rotate(9 561 725)"/>
    <text x="425" y="820" text-anchor="middle" class="small">More re-briefing, more drift, less stable rhythm</text>
  </g>

  <g>
    <circle cx="1175" cy="300" r="45" class="gold"/>
    <path d="M1142 336 C1158 353 1194 353 1209 336" class="cloud"/>
    <text x="1175" y="358" text-anchor="middle" class="tiny">human routes, not re-teaches</text>

    <rect x="930" y="430" width="210" height="250" rx="24" class="panel"/>
    <text x="1035" y="470" text-anchor="middle" class="small">Executor</text>
    <rect x="975" y="510" width="120" height="84" rx="12" class="paper"/>
    <line x1="994" y1="536" x2="1075" y2="536" class="ink"/>
    <line x1="994" y1="562" x2="1075" y2="562" class="ink"/>
    <line x1="994" y1="588" x2="1075" y2="588" class="ink"/>
    <text x="1035" y="632" text-anchor="middle" class="tiny">clearer contract rhythm</text>

    <rect x="1210" y="430" width="210" height="250" rx="24" class="panel"/>
    <text x="1315" y="470" text-anchor="middle" class="small">Auditor</text>
    <rect x="1252" y="510" width="126" height="84" rx="12" class="paper"/>
    <circle cx="1277" cy="616" r="10" class="seal"/>
    <text x="1315" y="632" text-anchor="middle" class="tiny">role stays narrower</text>

    <path d="M1168 347 C1122 397 1089 430 1058 438" class="arrow"/>
    <path d="M1184 347 C1227 398 1257 430 1290 438" class="arrow"/>
    <path d="M1118 676 C1180 736 1242 736 1303 676" class="arrow"/>

    <rect x="960" y="715" width="150" height="42" rx="12" class="paper"/>
    <text x="1035" y="742" text-anchor="middle" class="tiny">global_rules</text>
    <rect x="1120" y="715" width="170" height="42" rx="12" class="paper"/>
    <text x="1205" y="742" text-anchor="middle" class="tiny">planner</text>
    <rect x="1300" y="715" width="170" height="42" rx="12" class="paper"/>
    <text x="1385" y="742" text-anchor="middle" class="tiny">executor</text>
    <text x="1175" y="820" text-anchor="middle" class="small">Skill keeps roles and contracts steadier. Evidence still decides truth.</text>
  </g>
</svg>
