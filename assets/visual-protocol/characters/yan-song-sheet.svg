<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Yan Song character sheet</title>
  <desc id="desc">Character sheet for Yan Song, the executor drift-risk figure in Cyber-Ming.</desc>
  <defs>
    <style>
      .bg{fill:#F6F0E6}
      .panel{fill:#FFF9F0;stroke:#3A312B;stroke-width:4}
      .ink{stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .robe{fill:#9B5B46;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .trim{fill:#7A4638;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .paper{fill:#F7F1E5;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .seal{fill:#B9493E;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .skin{fill:#E5BE9D;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .label{font:700 28px Georgia, serif; fill:#3A312B}
      .small{font:500 21px 'Trebuchet MS', sans-serif; fill:#3A312B}
      .tiny{font:500 18px 'Trebuchet MS', sans-serif; fill:#3A312B}
      .line{fill:none;stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
    </style>
