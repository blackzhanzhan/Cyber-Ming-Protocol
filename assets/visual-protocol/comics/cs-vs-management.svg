<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">CS versus management storyboard</title>
  <desc id="desc">Three-panel storyboard showing why deep-water AI coding turns the developer into a governor of execution, routing, and audit.</desc>
  <defs>
    <style>
      .bg{fill:#F6F0E6}.panel{fill:#FFF9F0;stroke:#3A312B;stroke-width:4}.ink{stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.paper{fill:#F7F1E5;stroke:#3A312B;stroke-width:4}.gold{fill:#E2B93B;stroke:#3A312B;stroke-width:4}.blue{fill:#7E8794;stroke:#3A312B;stroke-width:4}.russet{fill:#9B5B46;stroke:#3A312B;stroke-width:4}.label{font:700 28px Georgia, serif;fill:#3A312B}.small{font:600 18px 'Trebuchet MS',sans-serif;fill:#3A312B}.tiny{font:500 16px 'Trebuchet MS',sans-serif;fill:#3A312B}
    </style>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="90" y="88" class="label">CS vs Management</text>
  <text x="90" y="124" class="small">Storyboard - deep-water AI coding turns the developer into a governor, not only a coder</text>
  <g transform="translate(70 220)">
    <rect width="450" height="580" rx="24" class="panel"/>
    <text x="34" y="46" class="small">1</text>
    <circle cx="225" cy="150" r="42" class="gold"/>
    <rect x="150" y="258" width="150" height="96" rx="12" class="paper"/>
    <text x="225" y="430" text-anchor="middle" class="small">In shallow water, the task still looks like code in front of you</text>
  </g>
  <g transform="translate(575 220)">
    <rect width="450" height="580" rx="24" class="panel"/>
    <text x="34" y="46" class="small">2</text>
    <circle cx="225" cy="116" r="40" class="gold"/>
    <circle cx="120" cy="260" r="34" class="russet"/>
    <circle cx="330" cy="260" r="34" class="blue"/>
    <path d="M225 160 C190 205 155 224 132 230" class="ink" fill="none"/>
    <path d="M225 160 C260 205 295 224 318 230" class="ink" fill="none"/>
    <text x="225" y="430" text-anchor="middle" class="small">In deep water, execution, routing, and audit all need governing</text>
  </g>
  <g transform="translate(1080 220)">
    <rect width="450" height="580" rx="24" class="panel"/>
    <text x="34" y="46" class="small">3</text>
    <circle cx="225" cy="116" r="40" class="gold"/>
    <rect x="92" y="300" width="96" height="78" rx="12" class="paper"/>
    <rect x="203" y="300" width="96" height="78" rx="12" class="paper"/>
    <rect x="314" y="300" width="96" height="78" rx="12" class="paper"/>
    <text x="140" y="346" text-anchor="middle" class="tiny">execute</text>
    <text x="251" y="346" text-anchor="middle" class="tiny">route</text>
    <text x="362" y="346" text-anchor="middle" class="tiny">audit</text>
    <text x="225" y="430" text-anchor="middle" class="small">The developer becomes a governor of power, not only a writer of code</text>
  </g>
</svg>
