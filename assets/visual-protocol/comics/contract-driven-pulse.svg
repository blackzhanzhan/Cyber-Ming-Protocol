<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Contract-driven pulse storyboard</title>
  <desc id="desc">Four-panel storyboard showing why pulse-sized contracts fit long-cycle development better than one giant spec.</desc>
  <defs>
    <style>
      .bg{fill:#F6F0E6}.panel{fill:#FFF9F0;stroke:#3A312B;stroke-width:4}.ink{stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.paper{fill:#F7F1E5;stroke:#3A312B;stroke-width:4}.gold{fill:#E2B93B;stroke:#3A312B;stroke-width:4}.blue{fill:#7E8794;stroke:#3A312B;stroke-width:4}.russet{fill:#9B5B46;stroke:#3A312B;stroke-width:4}.seal{fill:#A54A46;stroke:#3A312B;stroke-width:4}.spec{fill:#DCCAB3;stroke:#3A312B;stroke-width:4}.label{font:700 28px Georgia, serif;fill:#3A312B}.small{font:600 18px 'Trebuchet MS',sans-serif;fill:#3A312B}.tiny{font:500 16px 'Trebuchet MS',sans-serif;fill:#3A312B}
    </style>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="90" y="88" class="label">Contract-Driven Pulse</text>
  <text x="90" y="124" class="small">Storyboard - one giant spec is not the same thing as governing the current slice</text>
  <g transform="translate(70 170)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">1</text>
    <rect x="248" y="60" width="210" height="210" rx="16" class="spec"/>
    <text x="353" y="296" text-anchor="middle" class="small">one giant spec grows heavy</text>
  </g>
  <g transform="translate(830 170)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">2</text>
    <rect x="148" y="122" width="96" height="72" rx="12" class="paper"/>
    <rect x="300" y="122" width="96" height="72" rx="12" class="paper"/>
    <rect x="452" y="122" width="96" height="72" rx="12" class="paper"/>
    <circle cx="596" cy="160" r="34" class="russet"/>
    <text x="350" y="296" text-anchor="middle" class="small">workflow keeps order, but momentum still pushes through it</text>
  </g>
  <g transform="translate(70 560)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">3</text>
    <circle cx="205" cy="120" r="40" class="gold"/>
    <circle cx="102" cy="220" r="30" class="blue"/>
    <circle cx="308" cy="220" r="30" class="russet"/>
    <rect x="165" y="198" width="86" height="72" rx="12" class="paper"/>
    <circle cx="229" cy="240" r="10" class="seal"/>
    <text x="350" y="296" text-anchor="middle" class="small">the live slice gets its own contract, route, and check</text>
  </g>
  <g transform="translate(830 560)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">4</text>
    <rect x="112" y="128" width="86" height="72" rx="12" class="paper"/>
    <rect x="242" y="128" width="86" height="72" rx="12" class="paper"/>
    <rect x="372" y="128" width="86" height="72" rx="12" class="paper"/>
    <rect x="502" y="128" width="86" height="72" rx="12" class="paper"/>
    <circle cx="180" cy="166" r="9" class="seal"/>
    <circle cx="310" cy="166" r="9" class="seal"/>
    <circle cx="440" cy="166" r="9" class="seal"/>
    <circle cx="570" cy="166" r="9" class="seal"/>
    <text x="350" y="296" text-anchor="middle" class="small">long cycles advance by renewed pulse-sized contracts</text>
  </g>
</svg>
