<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Human not stamper storyboard</title>
  <desc id="desc">Four-panel storyboard showing the human becoming a stamp machine versus staying a routing center.</desc>
  <defs>
    <style>
      .bg{fill:#F6F0E6}.panel{fill:#FFF9F0;stroke:#3A312B;stroke-width:4}.ink{stroke:#3A312B;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.red{fill:#A54A46;stroke:#3A312B;stroke-width:4}.paper{fill:#F7F1E5;stroke:#3A312B;stroke-width:4}.gold{fill:#E2B93B;stroke:#3A312B;stroke-width:4}.blue{fill:#7E8794;stroke:#3A312B;stroke-width:4}.russet{fill:#9B5B46;stroke:#3A312B;stroke-width:4}.label{font:700 28px Georgia, serif;fill:#3A312B}.small{font:600 18px 'Trebuchet MS',sans-serif;fill:#3A312B}.tiny{font:500 16px 'Trebuchet MS',sans-serif;fill:#3A312B}
    </style>
  </defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="90" y="88" class="label">Human Not Stamper</text>
  <text x="90" y="124" class="small">Storyboard - the human must route, not merely approve after the fact</text>
  <g transform="translate(70 170)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">1</text>
    <rect x="420" y="80" width="170" height="120" rx="14" class="paper" transform="rotate(-8 505 140)"/>
    <circle cx="532" cy="138" r="28" class="red"/>
    <text x="505" y="280" text-anchor="middle" class="small">Yan Song pushes a finished-looking packet first</text>
    <circle cx="165" cy="225" r="40" class="gold"/>
    <text x="165" y="285" text-anchor="middle" class="tiny">hub sidelined</text>
  </g>
  <g transform="translate(830 170)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">2</text>
    <rect x="250" y="68" width="176" height="122" rx="14" class="paper" transform="rotate(6 338 129)"/>
    <rect x="448" y="88" width="176" height="122" rx="14" class="paper" transform="rotate(-6 536 149)"/>
    <circle cx="614" cy="212" r="30" class="red"/>
    <circle cx="145" cy="235" r="38" class="blue"/>
    <circle cx="86" cy="250" r="32" class="gold"/>
    <text x="350" y="278" text-anchor="middle" class="small">Review arrives after momentum already stamped the story</text>
  </g>
  <g transform="translate(70 560)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">3</text>
    <circle cx="350" cy="118" r="46" class="gold"/>
    <circle cx="168" cy="206" r="38" class="russet"/>
    <circle cx="530" cy="206" r="38" class="blue"/>
    <path d="M356 158 C330 188 260 214 206 220" class="ink" fill="none"/>
    <path d="M378 158 C404 188 474 214 528 220" class="ink" fill="none"/>
    <text x="350" y="280" text-anchor="middle" class="small">The hub interrupts and routes the packet to audit before release</text>
  </g>
  <g transform="translate(830 560)">
    <rect width="700" height="320" rx="24" class="panel"/>
    <text x="32" y="44" class="small">4</text>
    <circle cx="350" cy="116" r="46" class="gold"/>
    <rect x="182" y="174" width="142" height="102" rx="14" class="paper"/>
    <rect x="378" y="174" width="142" height="102" rx="14" class="paper"/>
    <rect x="544" y="174" width="108" height="102" rx="14" class="red"/>
    <text x="252" y="232" text-anchor="middle" class="tiny">plan</text>
    <text x="449" y="232" text-anchor="middle" class="tiny">audit</text>
    <text x="598" y="232" text-anchor="middle" class="tiny">grant</text>
    <text x="350" y="302" text-anchor="middle" class="small">Only a routed human stays a sovereign, not a stamp machine</text>
  </g>
</svg>
